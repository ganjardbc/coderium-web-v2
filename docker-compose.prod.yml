services:
  postgres:
    image: postgres:16-alpine
    container_name: coderium-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: production_password_here
      POSTGRES_DB: coderium
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: coderium-api-prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://postgres:production_password_here@postgres:5432/coderium?schema=public"
      PORT: 3030
      NODE_ENV: production
      JWT_SECRET: "production_jwt_secret_here"
      JWT_EXPIRES_IN: "7d"
      CORS_ORIGIN: "http://localhost,http://localhost:3000"
    ports:
      - "3030:3030"
    volumes:
      - api_uploads:/app/uploads

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: coderium-admin-prod
    restart: always
    ports:
      - "8080:80"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: coderium-web-prod
    restart: always
    environment:
      PORT: 3000
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE: "http://localhost:3030/api/v1"
    ports:
      - "3000:3000"

volumes:
  postgres_prod_data:
  api_uploads:
